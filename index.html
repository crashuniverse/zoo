<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Zoo</title>
  </head>
  <body>
    <!-- 3D Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Start Screen -->
    <div id="start-screen">
      <div id="start-content">
        <h1>ZOO</h1>
        <p>Explore the zoo and find all the hidden stars</p>
        <button id="play-btn">Play</button>
        <p class="hint" id="controls-hint"></p>
      </div>
    </div>

    <!-- In-Game HUD -->
    <div id="hud" style="display:none;">
      <div id="hud-stars">Stars: <span id="stars-count">0</span></div>
      <div id="game-message"></div>
      <div id="crosshair"></div>
      <button id="fullscreen-btn" aria-label="Fullscreen">
        <!-- expand-arrows SVG icon -->
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
        <span>Fullscreen</span>
      </button>
      <div id="ios-fullscreen-toast" style="display:none;">
        Tap <strong>Share</strong> ↗ then <strong>Add to Home Screen</strong> for fullscreen
      </div>
    </div>

    <!-- Mobile Touch Zones -->
    <div id="joystick-zone"></div>
    <div id="look-zone"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
